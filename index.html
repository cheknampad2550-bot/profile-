<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์นักศึกษา - สุภัสสรา เจ๊กนาม</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f3e8ff 0%, #e9d5ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .profile-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(107, 33, 168, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(233, 213, 255, 0.6);
        }
        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(107, 33, 168, 0.15);
        }
        .header-cover {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            height: 150px;
            position: relative;
        }
        .profile-img-container {
            width: 140px;
            height: 140px;
            margin: -70px auto 0 auto;
            position: relative;
            z-index: 2;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ffffff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            background-color: #f3e8ff;
        }
        .profile-content {
            padding: 24px 32px 32px 32px;
            text-align: center;
        }
        .profile-name {
            font-size: 24px;
            font-weight: 700;
            color: #1e1b4b;
            margin-bottom: 8px;
        }
        .student-id {
            display: inline-block;
            background: #f3e8ff;
            color: #6b21a8;
            font-size: 14px;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 20px;
            margin-bottom: 28px;
            border: 1px solid #e9d5ff;
        }
        .info-group {
            text-align: left;
            margin-bottom: 24px;
        }
        .info-group:last-child {
            margin-bottom: 0;
        }
        .group-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9333ea;
            margin-bottom: 12px;
            border-bottom: 2px solid #f3e8ff;
            padding-bottom: 6px;
            font-weight: 700;
        }
        .info-item {
            display: flex;
            align-items: flex-start; /* เปลี่ยนให้ชิดบนเผื่อข้อมูลยาวจนขึ้นบรรทัดใหม่ */
            margin-bottom: 14px;
            color: #4b5563;
            font-size: 15px;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-icon {
            width: 38px;
            height: 38px;
            background: #fdf4ff;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 14px;
            border: 1px solid #f3e8ff;
            flex-shrink: 0;
            font-size: 18px;
        }
        .info-text {
            display: flex;
            flex-grow: 1;
            align-items: center;
            min-height: 38px; /* ให้ความสูงอย่างน้อยเท่ากับไอคอน */
        }
        .info-text strong {
            color: #1f2937;
            width: 75px; /* กำหนดความกว้างของหัวข้อให้เท่ากัน */
            flex-shrink: 0; /* ป้องกันไม่ให้หัวข้อโดนบีบ */
        }
        .info-value {
            flex-grow: 1;
            word-break: break-word; /* ป้องกันข้อความยาวทะลุกรอบ */
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header-cover"></div>
        
        <div class="profile-img-container">
            <img class="profile-img" src="https://via.placeholder.com/150/e9d5ff/6b21a8?text=รูป" alt="รูปโปรไฟล์ สุภัสสรา">
        </div>
        
        <div class="profile-content">
            <div class="profile-name">สุภัสสรา เจ๊กนาม</div>
            <div class="student-id">รหัสนักศึกษา: 65XXXXXXX</div>
            
            <div class="info-group">
                <div class="group-title">ข้อมูลการศึกษา</div>
                
                <div class="info-item">
                    <div class="info-icon">🎓</div>
                    <div class="info-text">
                        <strong>คณะ:</strong>
                        <span class="info-value">วิทยาศาสตร์และเทคโนโลยี</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">📚</div>
                    <div class="info-text">
                        <strong>สาขา:</strong>
                        <span class="info-value">วิทยาการคอมพิวเตอร์</span>
                    </div>
                </div>
            </div>

            <div class="info-group">
                <div class="group-title">ข้อมูลติดต่อ</div>
                
                <div class="info-item">
                    <div class="info-icon">📧</div>
                    <div class="info-text">
                        <strong>อีเมล:</strong>
                        <span class="info-value">supassara.j@example.com</span>
                    </div>
                </div>
                
                <div class="info-item">
                    <div class="info-icon">📞</div>
                    <div class="info-text">
                        <strong>เบอร์โทร:</strong>
                        <span class="info-value">08X-XXX-XXXX</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
